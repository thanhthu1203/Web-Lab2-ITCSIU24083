<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Survey Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
        .survey-container { max-width: 600px; margin: 30px auto; border: 1px solid #ccc; padding: 20px; }
        .logo { width: 80px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="survey-container">
            <img src="https://cdn.haitrieu.com/wp-content/uploads/2021/09/Logo-DH-Quoc-Te-IU.png" class="logo"> 
            <h2 class="text-info">Survey </h2>
            <p>If you have a moment, we'd appreciate it if you would fill out this survey.</p>

            <form>
                <h5 class="text-info">Your information:</h5>
                <div class="form-group">
                    <label>First Name</label> 
                    <input type="text" class="form-control" name="firstName"> 
                </div>
                <div class="form-group">
                    <label>Last Name</label> 
                    <input type="text" class="form-control" name="lastName"> 
                </div>
                <div class="form-group">
                    <label>Email</label> 
                    <input type="email" class="form-control" name="email"> 
                </div>
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" class="form-control" name="dob"> 
                </div>

                <h5 class="text-info">How did you hear about us? </h5>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="hear" value="search">
                    <label class="form-check-label">Search engine</label> 
                </div>
                <h5 class="text-info mt-3">Would you like to receive announcements? </h5>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="check1" value="yes">
                    <label class="form-check-label" for="check1">YES, I'd like that.</label> 
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="check2" value="email">
                    <label class="form-check-label" for="check2">YES, please send me email announcements.</label> 
                </div>

                <div class="form-group mt-3">
                    <label>Please contact me by:</label> 
                    <select class="form-control" name="contactMethod"> 
                        <option>Email or postal mail</option> 
                        <option>Email only</option> 
                        <option>Postal mail only</option> 

                    </select>
                </div>

                <button type="submit" class="btn btn-secondary">Submit</button> 
            </form>
        </div>
    </div>
</body>
</html>
